AWSTemplateFormatVersion: '2010-09-09'
Description: 'SkillRelay - Shared App Runner resources'

Parameters:
  ProjectName:
    Type: String
    Default: skillrelay
    Description: Project name for resource naming

  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]
    Description: Environment name

Resources:
  VpcConnector:
    Type: AWS::AppRunner::VpcConnector
    Properties:
      VpcConnectorName: !Sub ${ProjectName}-${Environment}-vpc-conn
      Subnets:
        - !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-public-subnet-1-id
        - !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-public-subnet-2-id
      SecurityGroups:
        - !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-apprunner-sg-id
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-vpc-connector

  CoreObservabilityConfiguration:
    Type: AWS::AppRunner::ObservabilityConfiguration
    Properties:
      ObservabilityConfigurationName: !Sub ${ProjectName}-${Environment}-core-obs
      TraceConfiguration:
        Vendor: AWSXRAY
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-core-observability

  AIServerObservabilityConfiguration:
    Type: AWS::AppRunner::ObservabilityConfiguration
    Properties:
      ObservabilityConfigurationName: !Sub ${ProjectName}-${Environment}-ai-obs
      TraceConfiguration:
        Vendor: AWSXRAY
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-ai-server-observability

Outputs:
  VpcConnectorArn:
    Description: Shared App Runner VPC connector ARN
    Value: !GetAtt VpcConnector.VpcConnectorArn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-apprunner-vpc-connector-arn

  CoreObservabilityConfigurationArn:
    Description: Core App Runner observability configuration ARN
    Value: !GetAtt CoreObservabilityConfiguration.ObservabilityConfigurationArn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-core-observability-arn

  AIServerObservabilityConfigurationArn:
    Description: AI Server App Runner observability configuration ARN
    Value: !GetAtt AIServerObservabilityConfiguration.ObservabilityConfigurationArn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ai-observability-arn
