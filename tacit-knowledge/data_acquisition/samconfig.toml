# SAM deployment configuration for SkillRelay Scraper Pipeline
version = 0.1

[default.deploy.parameters]
stack_name = "skillrelay-production-scraper"
s3_bucket = "skillrelay-production-datasource"
s3_prefix = "sam-artifacts"
region = "ap-northeast-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
parameter_overrides = "Environment=production ProjectName=skillrelay DispatchIntervalMinutes=1"

[default.build.parameters]
use_container = true

[staging.deploy.parameters]
stack_name = "skillrelay-staging-scraper"
s3_bucket = "skillrelay-staging-datasource"
s3_prefix = "sam-artifacts"
region = "ap-northeast-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
parameter_overrides = "Environment=staging ProjectName=skillrelay DispatchIntervalMinutes=5"
